services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdc-laravel-app
    restart: unless-stopped
    ports:
      - "4040:80"
    volumes:
      - .:/var/www/html
      - ./backups:/var/www/html/backups
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    depends_on:
      run-migrations:
        condition: service_completed_successfully

  backup-cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdc-laravel-backup-cron
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./backups:/var/www/html/backups
    environment:
      - APP_ENV=local
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    depends_on:
      run-migrations:
        condition: service_completed_successfully
    entrypoint: ["sh", "-c", "echo '0 * * * * cd /var/www/html && DB_DATABASE=/var/www/html/database/database.sqlite /usr/local/bin/php artisan db:backup >> /var/log/cron.log 2>&1' > /etc/cron.d/backup-cron && chmod 0644 /etc/cron.d/backup-cron && crontab /etc/cron.d/backup-cron && cron -f"]

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdc-laravel-queue-worker
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./backups:/var/www/html/backups
    environment:
      - APP_ENV=local
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    depends_on:
      run-migrations:
        condition: service_completed_successfully
    entrypoint: ["php", "artisan", "queue:work", "--verbose", "--tries=3"]

  run-migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdc-laravel-run-migrations
    volumes:
      - .:/var/www/html
      - ./backups:/var/www/html/backups
    environment:
      - APP_ENV=local
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    depends_on:
      init-db:
        condition: service_completed_successfully
    entrypoint: ["php", "artisan", "migrate", "--force"]

  init-db:
    image: alpine
    container_name: tdc-laravel-init-db
    volumes:
      - .:/var/www/html
    entrypoint: ["sh", "-c", "mkdir -p /var/www/html/database && touch /var/www/html/database/database.sqlite && chmod 777 /var/www/html/database/database.sqlite && chmod 777 /var/www/html/database"]
